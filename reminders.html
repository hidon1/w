<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>תזכורות</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: 'Heebo', sans-serif; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      }
      h1 { 
        text-align: center; 
        color: #764ba2; 
        margin-bottom: 30px;
        font-size: 2rem;
      }
      .hidden { display: none; }
      .btn { 
        padding: .8rem 1.5rem; 
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff; 
        border: none; 
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn:hover { 
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      .btn:active { transform: translateY(0); }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
      }
      .form-group input[type="text"],
      .form-group input[type="datetime-local"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.3s;
      }
      .form-group input:focus {
        outline: none;
        border-color: #667eea;
      }
      .log { 
        font-family: 'Courier New', monospace; 
        white-space: pre-wrap; 
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
        max-height: 300px;
        overflow-y: auto;
        font-size: 0.9rem;
        color: #666;
      }
      .image-section {
        margin: 20px 0;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 8px;
        border: 2px dashed #ddd;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: #764ba2;
        text-decoration: none;
        font-weight: bold;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="index.html" class="back-link">← חזרה לעמוד הראשי</a>
      
      <h1>תזכורות עם תמונה</h1>

      <div class="image-section">
        <button id="pickBtn" class="btn" type="button">צלם / בחר תמונה</button>
        <input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment" />
      </div>

      <div class="form-group">
        <label>כותרת תזכורת:</label>
        <input id="titleInput" type="text" placeholder="הזן כותרת..." />
      </div>

      <div class="form-group">
        <label>תאריך יעד:</label>
        <input id="dueInput" type="datetime-local" />
      </div>

      <button id="saveBtn" class="btn" type="button">שמור תזכורת</button>

      <div class="log" id="log">מוכן להתחיל...</div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
