<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Test</title>
</head>
<body>
    <h1>Testing Simplified System</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function log(msg, isError = false) {
            const p = document.createElement('p');
            p.textContent = msg;
            p.style.color = isError ? 'red' : 'green';
            results.appendChild(p);
        }
        
        // Test 1: Check localStorage
        try {
            localStorage.setItem('test', 'value');
            const val = localStorage.getItem('test');
            if (val === 'value') {
                log('✓ localStorage works');
            } else {
                log('✗ localStorage read failed', true);
            }
            localStorage.removeItem('test');
        } catch (e) {
            log('✗ localStorage error: ' + e.message, true);
        }
        
        // Test 2: Check sessionStorage
        try {
            sessionStorage.setItem('test', 'value');
            const val = sessionStorage.getItem('test');
            if (val === 'value') {
                log('✓ sessionStorage works');
            } else {
                log('✗ sessionStorage read failed', true);
            }
            sessionStorage.removeItem('test');
        } catch (e) {
            log('✗ sessionStorage error: ' + e.message, true);
        }
        
        // Test 3: Check if index.html exists
        log('✓ Test file loaded successfully');
        
        // Test 4: Verify no Firebase in index.html
        fetch('index.html')
            .then(r => r.text())
            .then(html => {
                const firebaseCount = (html.match(/firebase/gi) || []).length;
                if (firebaseCount === 0) {
                    log('✓ No Firebase references found in index.html');
                } else {
                    log(`⚠ Found ${firebaseCount} Firebase references (should be 0 for production)`, true);
                }
                
                // Check for SimpleAuth
                if (html.includes('SimpleAuth')) {
                    log('✓ SimpleAuth found in index.html');
                } else {
                    log('✗ SimpleAuth not found', true);
                }
                
                // Check for AccessManagement
                if (html.includes('AccessManagement')) {
                    log('✓ AccessManagement found in index.html');
                } else {
                    log('✗ AccessManagement not found', true);
                }
            })
            .catch(e => {
                log('✗ Could not fetch index.html: ' + e.message, true);
            });
    </script>
</body>
</html>
