<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Reminders System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .test-section h3 { margin-bottom: 10px; color: #333; }
        button { padding: 10px 20px; margin: 5px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        .log { background: #f9f9f9; padding: 10px; margin-top: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>בדיקת מערכת תזכורות</h1>
        
        <div class="test-section">
            <h3>1. בדיקת IndexedDB</h3>
            <button onclick="testIndexedDB()">בדוק IndexedDB</button>
            <div id="idb-log" class="log"></div>
        </div>
        
        <div class="test-section">
            <h3>2. בדיקת גישה למצלמה</h3>
            <button onclick="testCamera()">בדוק גישה למצלמה</button>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleFileSelect(event)">
            <div id="camera-log" class="log"></div>
            <div id="image-preview" style="margin-top: 10px;"></div>
        </div>
        
        <div class="test-section">
            <h3>3. בדיקת Service Worker</h3>
            <button onclick="testServiceWorker()">בדוק Service Worker</button>
            <div id="sw-log" class="log"></div>
        </div>
        
        <div class="test-section">
            <h3>4. בדיקת מצב אונליין/אופליין</h3>
            <button onclick="testOnlineStatus()">בדוק מצב רשת</button>
            <div id="online-log" class="log"></div>
        </div>
    </div>
    
    <script>
        function log(elementId, message, isError = false) {
            const el = document.getElementById(elementId);
            const span = document.createElement('div');
            span.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            span.className = isError ? 'error' : 'success';
            el.appendChild(span);
        }
        
        async function testIndexedDB() {
            const logId = 'idb-log';
            document.getElementById(logId).innerHTML = '';
            
            try {
                log(logId, 'פותח IndexedDB...');
                const request = indexedDB.open('test-reminders-db', 1);
                
                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains('test-store')) {
                        db.createObjectStore('test-store', { keyPath: 'id' });
                        log(logId, 'נוצר object store חדש');
                    }
                };
                
                request.onsuccess = async () => {
                    log(logId, 'IndexedDB נפתח בהצלחה');
                    const db = request.result;
                    
                    // Test write
                    const testData = { id: 1, text: 'בדיקה', timestamp: Date.now() };
                    const tx1 = db.transaction('test-store', 'readwrite');
                    tx1.objectStore('test-store').put(testData);
                    
                    tx1.oncomplete = () => {
                        log(logId, 'נתונים נשמרו בהצלחה');
                        
                        // Test read
                        const tx2 = db.transaction('test-store', 'readonly');
                        const getRequest = tx2.objectStore('test-store').get(1);
                        
                        getRequest.onsuccess = () => {
                            log(logId, 'נתונים נקראו בהצלחה: ' + JSON.stringify(getRequest.result));
                        };
                    };
                };
                
                request.onerror = () => {
                    log(logId, 'שגיאה בפתיחת IndexedDB: ' + request.error, true);
                };
            } catch (error) {
                log(logId, 'שגיאה: ' + error.message, true);
            }
        }
        
        function testCamera() {
            const logId = 'camera-log';
            document.getElementById(logId).innerHTML = '';
            
            log(logId, 'בודק זמינות API...');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                log(logId, 'getUserMedia לא נתמך בדפדפן זה', true);
                log(logId, 'משתמש ב-file input במקום...');
                document.getElementById('cameraInput').click();
                return;
            }
            
            log(logId, 'מבקש הרשאת מצלמה...');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => {
                    log(logId, '✓ הרשאת מצלמה התקבלה');
                    log(logId, 'פותח file picker...');
                    // Stop the stream
                    stream.getTracks().forEach(track => track.stop());
                    // Open file picker
                    document.getElementById('cameraInput').click();
                })
                .catch(error => {
                    log(logId, 'שגיאה: ' + error.message, true);
                    log(logId, 'פותח file picker כחלופה...', false);
                    document.getElementById('cameraInput').click();
                });
        }
        
        function handleFileSelect(event) {
            const logId = 'camera-log';
            const file = event.target.files[0];
            
            if (file) {
                log(logId, `נבחר קובץ: ${file.name} (${Math.round(file.size / 1024)}KB)`);
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('image-preview');
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 100%; border-radius: 4px;">`;
                    log(logId, '✓ תמונה נטענה לתצוגה מקדימה');
                };
                reader.readAsDataURL(file);
            }
        }
        
        async function testServiceWorker() {
            const logId = 'sw-log';
            document.getElementById(logId).innerHTML = '';
            
            if (!('serviceWorker' in navigator)) {
                log(logId, 'Service Workers לא נתמכים בדפדפן זה', true);
                return;
            }
            
            try {
                log(logId, 'רושם Service Worker...');
                const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                log(logId, '✓ Service Worker נרשם בהצלחה');
                log(logId, 'Scope: ' + registration.scope);
                log(logId, 'Active: ' + (registration.active ? 'כן' : 'לא'));
            } catch (error) {
                log(logId, 'שגיאה ברישום Service Worker: ' + error.message, true);
            }
        }
        
        function testOnlineStatus() {
            const logId = 'online-log';
            document.getElementById(logId).innerHTML = '';
            
            const isOnline = navigator.onLine;
            log(logId, 'מצב רשת: ' + (isOnline ? 'מחובר' : 'לא מחובר'));
            log(logId, 'User Agent: ' + navigator.userAgent.substring(0, 50) + '...');
            
            // Add event listeners
            window.addEventListener('online', () => {
                log(logId, '📶 חזרה לאונליין');
            });
            
            window.addEventListener('offline', () => {
                log(logId, '📵 אופליין');
            });
            
            log(logId, '✓ Event listeners הוגדרו');
        }
    </script>
</body>
</html>
